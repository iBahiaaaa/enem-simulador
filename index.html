<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simulado ENEM</title>

    <link rel="stylesheet" href="css/menu.css">
</head>

<body>

    <div class="container">

        <div class="card">

            <h1>Simulado ENEM</h1>

            <p class="descricao">
                Escolha uma matéria para iniciar seus estudos.
            </p>

            <div class="materias">

                <button class="materia" data-materia="matematica">
                    📐 Matemática
                </button>

                <button class="materia" data-materia="portugues">
                    📖 Português
                </button>

                <button class="materia" data-materia="historia">
                    🏛️ História
                </button>

                <button class="materia" data-materia="geografia">
                    🌎 Geografia
                </button>

                <button class="materia" data-materia="biologia">
                    🧬 Biologia
                </button>

                <button class="materia" data-materia="fisica">
                    ⚛️ Física
                </button>

                <button class="materia" data-materia="quimica">
                    🧪 Química
                </button>

                <button class="materia" data-materia="filosofia">
                    🤔 Filosofia
                </button>

                <button class="materia" data-materia="sociologia">
                    👥 Sociologia
                </button>

                <button class="materia" data-materia="ingles">
                    🗽 Inglês
                </button>

                <button class="materia destaque" data-materia="geral">
                    🎯 Simulado Completo
                </button>

            </div>

        </div>

    </div>

    <script>

        document
            .querySelectorAll(".materia")
            .forEach(botao => {

                botao.addEventListener("click", () => {

                    const materia =
                        botao.dataset.materia;

                    localStorage.setItem(
                        "materiaSelecionada",
                        materia
                    );

                    window.location.href =
                        "simulado.html";
                });
            });

    </script>

</body>

</html>
